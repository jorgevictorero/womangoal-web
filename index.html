<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Womangoal — Agencia Internacional de Fútbol Femenino</title>
  <meta name="description" content="Conectamos talento, clubes y oportunidades en el fútbol femenino global desde Madrid." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ── Design Tokens ─────────────────────────────────────────────── */
    :root {
      --gold:     #C8A24B;
      --red:      #FF2E63;
      --cream:    #F5F2EC;
      --dark:     #1C1916;
      --mid:      #5E5954;
      --ink:      #0A0A0A;
      --charcoal: #141210;
      --muted:    #EDEAE2;
      --border:   #DCD8CB;
      --dim:      #9E9891;
      --font-d:   'Playfair Display', Georgia, serif;
      --font-b:   'Newsreader', Georgia, serif;
      --font-u:   'Geist', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-b); background: var(--cream); color: var(--dark); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    img { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }
    button, input, textarea, select { font-family: inherit; border: none; outline: none; background: none; }

    /* ── Header ─────────────────────────────────────────────────────── */
    .hdr { position: fixed; top: 0; left: 0; width: 100%; height: 80px; background: rgba(20,18,16,.90); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: space-between; padding: 0 64px; z-index: 100; }
    .hdr-logo { font-family: var(--font-d); font-size: 26px; font-weight: 700; color: var(--cream); letter-spacing: 3px; }
    .hdr-right { display: flex; align-items: center; gap: 36px; }
    .hdr-nav { font-family: var(--font-u); font-size: 12px; color: var(--cream); letter-spacing: .5px; opacity: .85; }
    .hdr-lang { font-family: var(--font-u); font-size: 11px; color: var(--cream); letter-spacing: 1px; opacity: .55; }
    .hdr-cta { font-family: var(--font-u); font-size: 12px; font-weight: 600; color: var(--cream); background: var(--red); padding: 10px 24px; border-radius: 4px; cursor: pointer; white-space: nowrap; }
    .hdr-ham { display: none; color: var(--cream); cursor: pointer; font-size: 26px; line-height: 1; background: none; border: none; }
    /* mobile menu */
    .mmenu { position: fixed; inset: 0; background: rgba(20,18,16,.98); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; }
    .mmenu-close { position: absolute; top: 18px; right: 20px; color: var(--cream); font-size: 28px; cursor: pointer; background: none; border: none; }
    .mmenu-link { font-family: var(--font-d); font-size: 32px; font-weight: 700; color: var(--cream); cursor: pointer; }
    .mmenu-cta { font-family: var(--font-u); font-size: 14px; font-weight: 600; color: var(--cream); background: var(--red); padding: 12px 32px; border-radius: 4px; cursor: pointer; border: none; margin-top: 16px; }

    /* ── Hero ────────────────────────────────────────────────────────── */
    .hero { position: relative; width: 100%; height: 900px; overflow: hidden; background: var(--ink); }
    .hero-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .hero-ov { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(10,10,10,.96) 0%, rgba(10,10,10,.40) 55%, rgba(10,10,10,.80) 100%); }
    .hero-cnt { position: absolute; top: 160px; left: 80px; display: flex; flex-direction: column; }
    .hero-line { font-family: var(--font-d); font-size: 130px; font-weight: 700; color: var(--cream); line-height: 1; }
    .hero-sub-wrap { padding-top: 44px; max-width: 900px; }
    .hero-sub { font-family: var(--font-b); font-size: 22px; font-style: italic; color: var(--cream); opacity: .82; }
    .hero-scroll { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .hero-scroll-txt { font-family: var(--font-u); font-size: 9px; letter-spacing: 3px; color: var(--cream); opacity: .45; }
    .hero-scroll-arr { opacity: .45; color: var(--cream); font-size: 18px; }

    /* ── Brand ────────────────────────────────────────────────────────── */
    .brand { background: var(--cream); display: flex; flex-direction: column; align-items: center; gap: 36px; padding: 120px 160px; }
    .brand-h { font-family: var(--font-d); font-size: 64px; font-weight: 700; color: var(--dark); text-align: center; line-height: 1.15; max-width: 860px; }
    .brand-body { font-family: var(--font-b); font-size: 24px; font-style: italic; color: var(--mid); text-align: center; line-height: 1.55; max-width: 680px; }
    .brand-rule { width: 48px; height: 2px; background: var(--red); }
    .brand-btn { font-family: var(--font-u); font-size: 14px; font-weight: 600; color: var(--cream); background: var(--dark); padding: 14px 36px; border-radius: 4px; cursor: pointer; border: none; }

    /* ── WWD ──────────────────────────────────────────────────────────── */
    .wwd { background: var(--ink); padding: 80px; display: flex; flex-direction: column; gap: 52px; }
    .wwd-label { font-family: var(--font-u); font-size: 12px; font-weight: 600; color: var(--red); letter-spacing: 4px; }
    .wwd-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; }
    .wwd-card { display: flex; flex-direction: column; gap: 16px; }
    .wwd-num { font-family: var(--font-d); font-size: 52px; font-weight: 700; color: var(--red); }
    .wwd-img { width: 100%; height: 260px; object-fit: cover; }
    .wwd-title { font-family: var(--font-u); font-size: 11px; font-weight: 600; color: var(--cream); letter-spacing: 2px; }
    .wwd-desc { font-family: var(--font-b); font-size: 14px; color: var(--mid); line-height: 1.55; }

    /* ── International ────────────────────────────────────────────────── */
    .intl { background: var(--ink); }
    .intl-split { display: flex; height: 720px; width: 100%; }
    .intl-photo { flex: 1; object-fit: cover; min-width: 0; }
    .intl-txt { width: 600px; flex-shrink: 0; background: var(--ink); display: flex; flex-direction: column; gap: 28px; padding: 80px 64px; justify-content: center; }
    .intl-eye { font-family: var(--font-u); font-size: 11px; font-weight: 600; color: var(--gold); letter-spacing: 3px; }
    .intl-h1 { font-family: var(--font-d); font-size: 64px; font-weight: 700; color: var(--cream); line-height: 1; }
    .intl-h2 { font-family: var(--font-d); font-size: 56px; font-weight: 700; color: var(--cream); line-height: 1; }
    .intl-desc { font-family: var(--font-b); font-size: 16px; color: var(--mid); line-height: 1.6; max-width: 472px; }
    .intl-arrows { display: flex; flex-direction: column; gap: 10px; }
    .intl-arrow { font-family: var(--font-b); font-size: 16px; color: var(--cream); }
    .intl-btn { display: inline-flex; align-items: center; font-family: var(--font-u); font-size: 13px; font-weight: 600; color: var(--cream); background: var(--red); padding: 14px 28px; border-radius: 4px; cursor: pointer; border: none; align-self: flex-start; }
    .intl-gallery { display: flex; height: 220px; gap: 3px; }
    .intl-gimg { flex: 1; object-fit: cover; min-width: 0; }

    /* ── Promises ─────────────────────────────────────────────────────── */
    .prom { background: var(--cream); }
    .prom-inner { padding: 80px 120px; display: flex; flex-direction: column; gap: 0; }
    .prom-eye { font-family: var(--font-u); font-size: 11px; font-weight: 600; color: var(--gold); letter-spacing: 3px; }
    .prom-lockup { display: flex; align-items: center; gap: 16px; margin-top: 16px; }
    .prom-badge { width: 64px; height: 64px; background: var(--dark); display: flex; align-items: center; justify-content: center; }
    .prom-badge-l { font-family: var(--font-d); font-size: 36px; font-weight: 700; color: var(--cream); }
    .prom-sub { display: flex; flex-direction: column; gap: 2px; }
    .prom-t1 { font-family: var(--font-d); font-size: 48px; font-weight: 700; color: var(--dark); }
    .prom-t2 { font-family: var(--font-b); font-size: 16px; font-style: italic; color: var(--mid); }
    .prom-spacer { height: 24px; }
    .prom-head { font-family: var(--font-d); font-size: 56px; font-weight: 700; color: var(--dark); line-height: 1.05; }
    .prom-body { font-family: var(--font-b); font-size: 18px; color: var(--mid); line-height: 1.6; margin-top: 24px; }
    .prom-row { display: flex; gap: 48px; margin-top: 48px; align-items: flex-start; }
    .prom-photo { width: 480px; flex-shrink: 0; height: 560px; object-fit: cover; }
    .prom-pillars { flex: 1; display: flex; flex-direction: column; }
    .prom-pillar { display: flex; flex-direction: column; gap: 8px; padding: 40px 0; }
    .prom-pbdr { height: 1px; background: var(--border); width: 100%; }
    .prom-pnum { font-family: var(--font-d); font-size: 48px; font-weight: 700; color: var(--gold); }
    .prom-ptitle { font-family: var(--font-u); font-size: 12px; font-weight: 600; color: var(--dark); letter-spacing: 3px; }
    .prom-pdesc { font-family: var(--font-b); font-size: 14px; color: var(--mid); line-height: 1.5; }
    .prom-cta-row { display: flex; align-items: center; gap: 16px; margin-top: 48px; }
    .prom-btn { font-family: var(--font-u); font-size: 14px; font-weight: 600; color: var(--ink); background: var(--gold); padding: 16px 32px; border-radius: 4px; cursor: pointer; border: none; }
    .prom-sec { font-family: var(--font-b); font-size: 15px; font-style: italic; color: var(--mid); cursor: pointer; }

    /* ── Academy ──────────────────────────────────────────────────────── */
    .acad { background: var(--ink); }
    .acad-inner { padding: 80px 120px; display: flex; flex-direction: column; }
    .acad-eye { font-family: var(--font-u); font-size: 11px; font-weight: 600; color: var(--gold); letter-spacing: 3px; }
    .acad-vis { width: 100%; height: 480px; object-fit: cover; margin-top: 24px; }
    .acad-head { font-family: var(--font-d); font-size: 64px; font-weight: 700; color: var(--cream); line-height: 1; margin-top: 40px; }
    .acad-body { font-family: var(--font-b); font-size: 18px; color: var(--dim); line-height: 1.6; max-width: 680px; margin-top: 24px; }
    .acad-steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 48px; }
    .acad-step { display: flex; flex-direction: column; gap: 16px; padding: 40px 32px; }
    .acad-step:nth-child(odd) { background: #141210; }
    .acad-step:nth-child(even) { background: #1A1714; }
    .acad-snum { font-family: var(--font-d); font-size: 48px; font-weight: 700; color: var(--gold); }
    .acad-stitle { font-family: var(--font-u); font-size: 12px; font-weight: 600; color: var(--cream); letter-spacing: 2px; }
    .acad-sdesc { font-family: var(--font-b); font-size: 14px; color: var(--dim); line-height: 1.5; }
    .acad-cta-row { display: flex; align-items: center; gap: 24px; margin-top: 48px; }
    .acad-btn { font-family: var(--font-u); font-size: 14px; font-weight: 600; color: var(--ink); background: var(--gold); padding: 16px 32px; border-radius: 4px; cursor: pointer; border: none; }
    .acad-sec { font-family: var(--font-b); font-size: 15px; font-style: italic; color: var(--dim); cursor: pointer; }

    /* ── Partners ─────────────────────────────────────────────────────── */
    .part { background: var(--ink); }
    .part-div { height: 1px; background: #2A2520; }
    .part-inner { padding: 60px 120px; display: flex; flex-direction: column; gap: 32px; }
    .part-label { font-family: var(--font-u); font-size: 11px; font-weight: 600; color: #5E5954; letter-spacing: 3px; }
    .part-row { display: flex; align-items: center; gap: 48px; flex-wrap: wrap; }
    .part-name { font-family: var(--font-u); font-size: 18px; font-weight: 700; color: #3A3530; min-width: 80px; text-align: center; }

    /* ── Projects ─────────────────────────────────────────────────────── */
    .projs { background: var(--cream); }
    .projs-hdr { display: flex; align-items: center; justify-content: space-between; padding: 80px 120px 40px; }
    .projs-title { font-family: var(--font-u); font-size: 11px; font-weight: 600; color: var(--mid); letter-spacing: 3px; }
    .projs-all { font-family: var(--font-b); font-size: 14px; font-style: italic; color: var(--mid); cursor: pointer; }
    .proj-row { display: flex; width: 100%; }
    .proj-photo { width: 720px; flex-shrink: 0; height: 480px; object-fit: cover; }
    .proj-cnt { flex: 1; display: flex; flex-direction: column; gap: 24px; padding: 60px 80px; justify-content: center; }
    .proj-cnt--a { background: #EDEAE2; }
    .proj-cnt--b { background: #F5F2EC; }
    .proj-num { font-family: var(--font-d); font-size: 64px; font-weight: 700; color: var(--gold); }
    .proj-tag { font-family: var(--font-u); font-size: 11px; color: var(--mid); letter-spacing: 2px; }
    .proj-name { font-family: var(--font-d); font-size: 40px; font-weight: 700; color: var(--dark); line-height: 1.1; }
    .proj-desc { font-family: var(--font-b); font-size: 16px; color: var(--mid); line-height: 1.6; }
    .proj-cta { font-family: var(--font-u); font-size: 13px; font-weight: 600; color: var(--red); letter-spacing: 1px; cursor: pointer; }

    /* ── Impact ───────────────────────────────────────────────────────── */
    .impact { background: var(--ink); }
    .impact-inner { display: flex; }
    .impact-left { width: 600px; flex-shrink: 0; display: flex; flex-direction: column; gap: 32px; padding: 100px 80px; }
    .impact-tphoto { width: 100%; height: 360px; object-fit: cover; }
    .impact-eye { font-family: var(--font-u); font-size: 11px; font-weight: 600; color: var(--gold); letter-spacing: 3px; }
    .impact-mani { font-family: var(--font-d); font-size: 32px; font-style: italic; color: var(--cream); line-height: 1.4; }
    .impact-body { font-family: var(--font-b); font-size: 16px; color: var(--dim); line-height: 1.6; }
    .impact-team-cta { font-family: var(--font-u); font-size: 13px; font-weight: 600; color: var(--red); letter-spacing: 1px; cursor: pointer; }
    .impact-right { flex: 1; display: flex; flex-direction: column; padding: 100px 80px; }
    .impact-stat { display: flex; flex-direction: column; gap: 8px; padding-bottom: 48px; }
    .impact-sbdr { height: 1px; background: #2A2520; }
    .impact-snum { font-family: var(--font-d); font-size: 80px; font-weight: 700; color: var(--cream); }
    .impact-slbl { font-family: var(--font-b); font-size: 16px; color: var(--dim); }

    /* ── Manifesto ────────────────────────────────────────────────────── */
    .mani { position: relative; height: 700px; background: var(--ink); overflow: hidden; }
    .mani-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: .40; }
    .mani-ov { position: absolute; inset: 0; background: rgba(10,10,10,.55); }
    .mani-cnt { position: absolute; top: 120px; left: 120px; display: flex; flex-direction: column; gap: 16px; max-width: 900px; }
    .mani-lbl { font-family: var(--font-u); font-size: 11px; font-weight: 600; color: var(--gold); letter-spacing: 4px; }
    .mani-l1 { font-family: var(--font-d); font-size: 120px; font-weight: 700; color: var(--cream); line-height: .9; }
    .mani-l2 { font-family: var(--font-d); font-size: 100px; font-style: italic; color: var(--gold); line-height: .9; }
    .mani-l3 { font-family: var(--font-d); font-size: 100px; font-style: italic; color: var(--cream); line-height: .9; }

    /* ── Contact ──────────────────────────────────────────────────────── */
    .cont { background: var(--cream); }
    .cont-inner { display: flex; }
    .cont-left { width: 560px; flex-shrink: 0; display: flex; flex-direction: column; gap: 24px; padding: 100px 80px; }
    .cont-eye { font-family: var(--font-u); font-size: 11px; font-weight: 600; color: var(--gold); letter-spacing: 3px; }
    .cont-head { font-family: var(--font-d); font-size: 52px; font-weight: 700; color: var(--dark); line-height: 1.1; }
    .cont-sub { font-family: var(--font-b); font-size: 17px; color: var(--mid); line-height: 1.6; }
    .cont-off-lbl { font-family: var(--font-u); font-size: 11px; font-weight: 600; color: var(--dim); letter-spacing: 3px; margin-top: 8px; }
    .cont-off { font-family: var(--font-b); font-size: 15px; color: var(--mid); }
    .cont-right { flex: 1; display: flex; flex-direction: column; gap: 20px; padding: 100px 80px; }
    .f-field { display: flex; flex-direction: column; gap: 8px; }
    .f-lbl { font-family: var(--font-u); font-size: 12px; font-weight: 600; color: var(--dark); letter-spacing: 1px; }
    .f-inp { height: 48px; background: var(--muted); border-radius: 4px; padding: 0 16px; font-family: var(--font-b); font-size: 15px; color: var(--dark); width: 100%; }
    .f-inp::placeholder { color: var(--dim); }
    .f-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .f-sel { height: 48px; background: var(--muted); border-radius: 4px; padding: 0 16px; font-family: var(--font-b); font-size: 15px; color: var(--dark); width: 100%; appearance: none; cursor: pointer; }
    .f-ta { height: 120px; background: var(--muted); border-radius: 4px; padding: 16px; font-family: var(--font-b); font-size: 15px; color: var(--dark); width: 100%; resize: none; }
    .f-rgpd { display: flex; align-items: flex-start; gap: 12px; }
    .f-rgpd-box { width: 18px; height: 18px; min-width: 18px; background: var(--muted); border-radius: 2px; border: 1px solid var(--border); cursor: pointer; }
    .f-rgpd-txt { font-family: var(--font-b); font-size: 13px; color: var(--mid); line-height: 1.4; }
    .f-submit { height: 56px; background: var(--red); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: var(--font-u); font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 2px; cursor: pointer; width: 100%; border: none; }

    /* ── Footer ───────────────────────────────────────────────────────── */
    .foot { background: var(--ink); }
    .foot-top { display: flex; justify-content: space-between; padding: 80px 120px 60px; }
    .foot-brand { width: 400px; display: flex; flex-direction: column; gap: 24px; }
    .foot-logo { font-family: var(--font-d); font-size: 36px; font-weight: 700; color: var(--cream); }
    .foot-tag { font-family: var(--font-b); font-size: 15px; color: var(--dim); line-height: 1.6; max-width: 280px; }
    .foot-nl { display: flex; flex-direction: column; gap: 12px; }
    .foot-nl-lbl { font-family: var(--font-u); font-size: 10px; font-weight: 600; color: #5E5954; letter-spacing: 2px; }
    .foot-nl-row { display: flex; height: 44px; }
    .foot-nl-inp { flex: 1; height: 44px; background: #141210; border: 1px solid #2A2520; border-radius: 4px 0 0 4px; padding: 0 12px; font-family: var(--font-b); font-size: 14px; color: var(--cream); }
    .foot-nl-inp::placeholder { color: #5E5954; }
    .foot-nl-btn { height: 44px; padding: 0 16px; background: var(--red); border-radius: 0 4px 4px 0; font-family: var(--font-u); font-size: 12px; font-weight: 600; color: #fff; cursor: pointer; border: none; white-space: nowrap; }
    .foot-nav { display: flex; gap: 80px; }
    .foot-col { display: flex; flex-direction: column; gap: 16px; }
    .foot-col-t { font-family: var(--font-u); font-size: 10px; font-weight: 600; color: #5E5954; letter-spacing: 2px; }
    .foot-lnk { font-family: var(--font-b); font-size: 15px; color: var(--dim); cursor: pointer; }
    .foot-div { height: 1px; background: #1E1A17; }
    .foot-bot { display: flex; align-items: center; justify-content: space-between; padding: 24px 120px; }
    .foot-copy { font-family: var(--font-u); font-size: 12px; color: #5E5954; }
    .foot-legal { display: flex; gap: 32px; }
    .foot-legal-lnk { font-family: var(--font-u); font-size: 12px; color: #5E5954; cursor: pointer; }

    /* ── Mobile ───────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .hdr { height: 60px; padding: 0 20px; }
      .hdr-logo { font-size: 20px; letter-spacing: 2px; }
      .hdr-right { display: none; }
      .hdr-ham { display: block; }
      .hero { height: 560px; }
      .hero-cnt { top: 120px; left: 24px; right: 24px; }
      .hero-line { font-size: 42px; }
      .hero-sub-wrap { padding-top: 24px; max-width: 340px; }
      .hero-sub { font-size: 16px; }
      .brand { padding: 60px 40px; gap: 28px; }
      .brand-h { font-size: 36px; }
      .brand-body { font-size: 18px; }
      .wwd { padding: 24px; gap: 36px; }
      .wwd-grid { grid-template-columns: 1fr; }
      .wwd-num { font-size: 44px; }
      .wwd-img { height: 200px; }
      .intl-split { flex-direction: column; height: auto; }
      .intl-photo { height: 240px; width: 100%; }
      .intl-txt { width: 100%; padding: 40px 24px; gap: 20px; }
      .intl-h1 { font-size: 40px; }
      .intl-h2 { font-size: 34px; }
      .intl-desc { font-size: 15px; max-width: 100%; }
      .intl-gallery { height: 160px; }
      .prom-inner { padding: 60px 24px; }
      .prom-badge { width: 48px; height: 48px; }
